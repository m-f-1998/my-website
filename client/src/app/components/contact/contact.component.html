<div id="contact" class="px-4 sm:px-8 pt-3 pb-5">
  <div class="card mb-0">
    <h4 class="text-xl font-bold text-center text-gray-100 pt-6 pb-2">Contact Me</h4>
    <p class="text-gray-400 text-sm text-center px-8 pb-4">Whether you'd like to discuss a potential opportunity, collaborate on a project, or simply request a full copy of my CV — feel free to get in touch.</p>
    <div class="px-8 pb-8">
      @if (processing()) {
        <div class="bg-blue-500/20 border border-blue-500 text-blue-300 rounded-lg p-4 text-center text-lg flex items-center justify-center gap-3">
          <fa-icon [icon]="iconSvc.getIcon('fas', 'spinner')" animation="spin" />
          Sending...
        </div>
      } @else if (success()) {
        <div class="bg-green-500/20 border border-green-500 text-green-300 rounded-lg p-4 text-center text-lg flex items-center justify-center gap-3">
          <fa-icon [icon]="iconSvc.getIcon('fas', 'check')" />
          Sent!
        </div>
      } @else if (error()) {
        <div class="bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-4 text-center text-lg flex items-center justify-center gap-3">
          <fa-icon [icon]="iconSvc.getIcon('fas', 'exclamation-triangle')" />
          Error! Please try again later.
        </div>
      } @else {
        <form [formGroup]="contactForm!" (submit)="sendEmail()">
          <div class="mb-4">
            <input
              class="w-full px-4 py-2.5 bg-gray-700 rounded-lg border border-gray-600 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all"
              type="text" name="subject" placeholder="Subject" formControlName="subject"
            />
          </div>
          <div class="mb-4">
            <textarea
              class="w-full px-4 py-2.5 bg-gray-700 rounded-lg border border-gray-600 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all min-h-[120px] resize-y"
              name="message" placeholder="Your Message" formControlName="message"
            ></textarea>
          </div>
          <div>
            <button class="btn-primary" type="submit" [disabled]="!contactForm!.valid">Send</button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
