<header>
  <nav class="bg-gray-900/90 backdrop-blur-md border-b border-gray-800/60 w-full sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-14">
        <button (click)="scrollTo('about')" class="flex items-center gap-2.5 group cursor-pointer">
          <img src="/api/img/matthew.jpg?w=64&f=webp" alt="Matthew Frankland"
            class="w-8 h-8 rounded-full object-cover border border-brand/40 group-hover:border-brand/70 transition-colors duration-200" />
          <span class="hidden sm:block text-gray-100 font-semibold text-sm tracking-wide group-hover:text-white transition-colors duration-200">Matthew Frankland</span>
        </button>

        <ul class="hidden sm:flex items-center gap-1">
          <li>
            <button (click)="scrollTo('skill')" class="flex items-center gap-1.5 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-gray-800/60 transition-all duration-200 cursor-pointer">
              <fa-icon [icon]="iconSvc.getIcon('fas', 'code')" class="text-xs opacity-70" />
              Skills
            </button>
          </li>
          <li>
            <button (click)="scrollTo('projects')" class="flex items-center gap-1.5 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-gray-800/60 transition-all duration-200 cursor-pointer">
              <fa-icon [icon]="iconSvc.getIcon('fas', 'folder-open')" class="text-xs opacity-70" />
              Projects
            </button>
          </li>
          <li>
            <button (click)="scrollTo('experience')" class="flex items-center gap-1.5 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg hover:bg-gray-800/60 transition-all duration-200 cursor-pointer">
              <fa-icon [icon]="iconSvc.getIcon('fas', 'briefcase')" class="text-xs opacity-70" />
              Experience
            </button>
          </li>
          <li>
            <button (click)="scrollTo('contact')" class="flex items-center gap-1.5 ml-2 px-4 py-2 text-sm font-medium text-green-400 hover:text-white border border-green-400/40 hover:bg-brand hover:border-brand rounded-lg transition-all duration-200 cursor-pointer">
              <fa-icon [icon]="iconSvc.getIcon('fas', 'envelope')" class="text-xs" />
              Contact
            </button>
          </li>
        </ul>

        <button (click)="toggleMenu()" class="sm:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800/60 transition-all duration-200 focus:outline-none" aria-label="Toggle Navigation">
          @if (menuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          }
        </button>
      </div>

      @if (menuOpen()) {
        <div class="sm:hidden border-t border-gray-800/60 py-2">
          <ul class="flex flex-col gap-1">
            <li>
              <button (click)="scrollTo('skill')" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-white hover:bg-gray-800/60 rounded-lg transition-all duration-200 cursor-pointer">
                <fa-icon [icon]="iconSvc.getIcon('fas', 'code')" class="w-4 text-gray-500" />
                Skills
              </button>
            </li>
            <li>
              <button (click)="scrollTo('projects')" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-white hover:bg-gray-800/60 rounded-lg transition-all duration-200 cursor-pointer">
                <fa-icon [icon]="iconSvc.getIcon('fas', 'folder-open')" class="w-4 text-gray-500" />
                Projects
              </button>
            </li>
            <li>
              <button (click)="scrollTo('experience')" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:text-white hover:bg-gray-800/60 rounded-lg transition-all duration-200 cursor-pointer">
                <fa-icon [icon]="iconSvc.getIcon('fas', 'briefcase')" class="w-4 text-gray-500" />
                Experience
              </button>
            </li>
            <li>
              <button (click)="scrollTo('contact')" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-green-400 hover:text-white hover:bg-brand/20 rounded-lg transition-all duration-200 cursor-pointer">
                <fa-icon [icon]="iconSvc.getIcon('fas', 'envelope')" class="w-4" />
                Contact
              </button>
            </li>
          </ul>
        </div>
      }
    </div>
  </nav>
</header>
