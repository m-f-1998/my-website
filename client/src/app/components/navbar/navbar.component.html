<header>
  <nav class="bg-brand w-full sticky top-0 z-50 shadow-lg">
    <div class="px-4">
      <div class="flex items-center justify-end py-2 sm:hidden">
        <button (click)="toggleMenu()" class="p-2 text-white focus:outline-none" aria-label="Toggle Navigation">
          @if (menuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          }
        </button>
      </div>
      <div [class]="menuOpen() ? 'block' : 'hidden sm:block'">
        <ul class="flex flex-col sm:flex-row sm:h-12">
          <li class="transition-colors duration-200 hover:bg-brand-hover" (click)="scrollTo('skill')">
            <a class="block px-4 py-3 text-white cursor-pointer">Skills</a>
          </li>
          <li class="transition-colors duration-200 hover:bg-brand-hover" (click)="scrollTo('projects')">
            <a class="block px-4 py-3 text-white cursor-pointer">Projects</a>
          </li>
          <li class="transition-colors duration-200 hover:bg-brand-hover" (click)="scrollTo('experience')">
            <a class="block px-4 py-3 text-white cursor-pointer">Experience</a>
          </li>
          <li class="transition-colors duration-200 hover:bg-brand-hover" (click)="scrollTo('contact')">
            <a class="block px-4 py-3 text-white cursor-pointer">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
