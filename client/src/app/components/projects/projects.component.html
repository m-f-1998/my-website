<div id="projects" class="px-4 py-5">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (project of projects; track $index) {
      <div class="bg-gray-800/70 border border-gray-700/40 rounded-xl overflow-hidden flex flex-col group hover:-translate-y-1 hover:shadow-2xl hover:border-gray-600/60 transition-all duration-200">
        <div class="overflow-hidden">
          <img appImgShimmer
            src="/api/img/projects/{{ project.imageUrl }}?w=640&f=webp"
            srcset="
              /api/img/projects/{{ project.imageUrl }}?w=320&f=webp 320w,
              /api/img/projects/{{ project.imageUrl }}?w=640&f=webp 640w,
              /api/img/projects/{{ project.imageUrl }}?w=1024&f=webp 1024w
            "
            sizes="(max-width: 600px) 100vw, 600px"
            alt="{{ project.altTag }}"
            loading="lazy"
            decoding="async"
            class="w-full h-44 object-cover object-top group-hover:scale-105 transition-transform duration-300"
          />
        </div>
        <div class="px-4 py-4 flex flex-col flex-1 border-t border-gray-700/40">
          <h5 class="font-bold text-gray-100 mb-2">{{ project.title }}</h5>
          <p class="text-gray-400 text-sm leading-relaxed mb-3 flex-1">{{ project.description }}</p>
          @if (project.links.length) {
            <div class="flex flex-wrap gap-2 mt-auto pt-1">
              @for (link of project.links; track $index) {
                <a target="_blank" href="{{ link.url }}" class="btn-primary text-xs py-1.5 px-3">{{ link.label }}</a>
              }
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
